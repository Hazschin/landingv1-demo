<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,300;1,9..144,400;1,9..144,500&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  /* Paper & ink (warm) */
  --paper:#EFE9DC;
  --paper-2:#E6DECD;
  --paper-3:#DCD3BE;
  --ink:#1A1612;
  --ink-soft:#5C5247;
  --ink-faded:rgba(26,22,18,0.55);

  /* Accents */
  --clay:#B05A3C;        /* terracota real, cálida */
  --clay-deep:#8E4128;
  --moss:#6E7758;        /* acento frío sutil */

  /* Lines & shadow */
  --line:rgba(26,22,18,0.14);
  --line-soft:rgba(26,22,18,0.07);

  /* Type */
  --serif:'Fraunces', 'Times New Roman', serif;
  --sans:'Manrope', system-ui, sans-serif;

  /* Layout */
  --gutter:48px;
  --max:1440px;
}

*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  background:var(--paper);
  color:var(--ink);
  font-family:var(--sans);
  font-weight:400;
  line-height:1.6;
  overflow-x:hidden;
  /* sutil grano de papel */
  background-image:
    radial-gradient(rgba(26,22,18,0.025) 1px, transparent 1px),
    radial-gradient(rgba(26,22,18,0.018) 1px, transparent 1px);
  background-size:3px 3px, 7px 7px;
  background-position:0 0, 1px 2px;
}

::selection{background:var(--clay); color:var(--paper)}

.serif{font-family:var(--serif)}

/* ============================================
   NAV
============================================ */
nav{
  position:fixed;
  top:0;left:0;right:0;
  z-index:100;
  padding:22px 48px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:rgba(239,233,220,0.85);
  backdrop-filter:blur(12px) saturate(1.1);
  -webkit-backdrop-filter:blur(12px) saturate(1.1);
  border-bottom:1px solid var(--line-soft);
  transition:padding 0.3s ease, background 0.3s ease;
}
nav.scrolled{
  padding:14px 48px;
  background:rgba(239,233,220,0.95);
  border-bottom-color:var(--line);
}
.nav-logo{
  font-family:var(--serif);
  font-size:19px;
  font-weight:500;
  letter-spacing:-0.015em;
}
.nav-logo em{font-style:italic; font-weight:400; color:var(--clay)}
.nav-links{display:flex;gap:36px;list-style:none}
.nav-links a{
  color:var(--ink-soft);
  text-decoration:none;
  font-size:11px;
  letter-spacing:0.2em;
  text-transform:uppercase;
  transition:color 0.25s;
  position:relative;
}
.nav-links a::after{
  content:"";
  position:absolute;
  bottom:-6px; left:0;
  width:100%; height:1px;
  background:var(--clay);
  transform:scaleX(0); transform-origin:right;
  transition:transform 0.35s ease;
}
.nav-links a:hover{color:var(--ink)}
.nav-links a:hover::after{transform:scaleX(1); transform-origin:left}

/* ============================================
   HERO
============================================ */
.hero{
  min-height:100vh;
  padding:160px 48px 80px;
  display:grid;
  grid-template-columns:1.15fr 1fr;
  gap:72px;
  align-items:center;
  position:relative;
}
.hero-text{position:relative}
.hero-label{
  font-size:10px;
  letter-spacing:0.4em;
  text-transform:uppercase;
  color:var(--ink-soft);
  margin-bottom:36px;
  display:flex;
  align-items:center;
  gap:14px;
}
.hero-label::before{
  content:"";
  width:36px;height:1px;background:var(--clay);
}
.hero h1{
  font-family:var(--serif);
  font-size:clamp(64px,10.5vw,168px);
  font-weight:300;
  line-height:0.88;
  letter-spacing:-0.035em;
  margin-bottom:44px;
}
.hero h1 em{
  font-style:italic;
  font-weight:400;
  color:var(--clay);
}
.hero-tagline{
  font-family:var(--serif);
  font-style:italic;
  font-size:clamp(20px,1.7vw,24px);
  font-weight:300;
  line-height:1.45;
  max-width:480px;
  color:var(--ink-soft);
}
.hero-meta{
  position:absolute;
  bottom:32px; left:48px; right:48px;
  display:flex;
  justify-content:space-between;
  align-items:end;
  gap:32px;
  font-size:10px;
  letter-spacing:0.35em;
  text-transform:uppercase;
  color:var(--ink-faded);
  pointer-events:none;
}
.hero-meta-rule{
  flex:1;
  height:1px;
  background:var(--line);
  margin:0 6px 6px;
}
.hero-image{
  overflow:hidden;
  position:relative;
  aspect-ratio:4/5;
}
.hero-image img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
  filter:saturate(0.9) contrast(1.02);
  transition:transform 1.2s ease;
}
.hero-image:hover img{transform:scale(1.02)}
.hero-image-caption{
  position:absolute;
  bottom:16px; right:16px;
  font-size:10px;
  letter-spacing:0.22em;
  text-transform:uppercase;
  color:var(--paper);
  background:rgba(26,22,18,0.68);
  padding:8px 14px;
  backdrop-filter:blur(4px);
  -webkit-backdrop-filter:blur(4px);
}

/* ============================================
   SECTION BASE
============================================ */
section{padding:130px 48px}
.section-header{
  display:grid;
  grid-template-columns:auto 1fr;
  gap:48px;
  align-items:baseline;
  margin-bottom:88px;
  max-width:var(--max);
  margin-left:auto;
  margin-right:auto;
}
.section-num{
  font-family:var(--serif);
  font-style:italic;
  font-size:14px;
  letter-spacing:0.05em;
  color:var(--clay);
  font-weight:400;
  display:flex;
  align-items:center;
  gap:14px;
}
.section-num::after{
  content:"";
  width:60px;height:1px;
  background:var(--clay);
  opacity:0.5;
}
.section-title{
  font-family:var(--serif);
  font-size:clamp(40px,6.2vw,80px);
  font-weight:300;
  letter-spacing:-0.025em;
  line-height:0.98;
}
.section-title em{font-style:italic; font-weight:400; color:var(--clay)}

/* ============================================
   SOBRE MÍ
============================================ */
.about{background:var(--paper-2)}
.about-grid{
  display:grid;
  grid-template-columns:1fr 1.35fr;
  gap:80px;
  align-items:start;
  max-width:var(--max);
  margin:0 auto;
}
.about-image{
  overflow:hidden;
  position:relative;
  aspect-ratio:4/5;
  position:sticky;
  top:120px;
}
.about-image img{
  width:100%; height:100%;
  object-fit:cover;
  display:block;
  filter:grayscale(0.15) contrast(1.05);
}
.about-body{padding-top:8px}
.about-body p{
  font-size:17px;
  line-height:1.78;
  margin-bottom:24px;
  color:var(--ink-soft);
  text-wrap:pretty;
}
.about-body p:first-child{
  font-family:var(--serif);
  font-size:clamp(22px, 2vw, 28px);
  font-style:italic;
  font-weight:300;
  color:var(--ink);
  line-height:1.4;
  margin-bottom:32px;
}
.about-body p:first-child::first-letter{
  font-size:1.4em;
  color:var(--clay);
}

/* ============================================
   DECLARACIÓN
============================================ */
.statement{
  background:var(--ink);
  color:var(--paper);
  padding:170px 48px;
  position:relative;
}
.statement::before{
  content:"";
  position:absolute;
  top:0;left:0;right:0;
  height:1px;
  background:linear-gradient(90deg, transparent, rgba(176,90,60,0.3), transparent);
}
.statement .section-num{color:var(--clay)}
.statement .section-num::after{background:var(--clay); opacity:0.4}
.statement .section-title{color:var(--paper)}
.statement .section-title em{color:var(--clay)}
.statement-body{
  max-width:860px;
  margin:0 auto;
}
.statement-body blockquote{
  font-family:var(--serif);
  font-style:italic;
  font-size:clamp(28px,3.6vw,44px);
  font-weight:300;
  line-height:1.28;
  margin-bottom:60px;
  padding-left:36px;
  border-left:2px solid var(--clay);
  letter-spacing:-0.015em;
}
.statement-body p{
  font-size:17px;
  line-height:1.85;
  margin-bottom:24px;
  color:rgba(239,233,220,0.78);
  max-width:680px;
}

/* ============================================
   GALERÍA
============================================ */
.gallery{
  max-width:var(--max);
  margin:0 auto;
}
.gallery-grid{
  display:grid;
  grid-template-columns:repeat(12,1fr);
  gap:56px 36px;
}
.work{
  cursor:pointer;
  display:flex;
  flex-direction:column;
}
.work-image{
  overflow:hidden;
  margin-bottom:22px;
  position:relative;
  background:var(--paper-2);
}
.work-image::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(180deg, transparent 55%, rgba(26,22,18,0.55));
  opacity:0;
  transition:opacity 0.4s ease;
  pointer-events:none;
}
.work:hover .work-image::after{opacity:1}
.work-image img{
  width:100%; height:100%;
  object-fit:cover;
  display:block;
  transition:transform 1s ease;
}
.work:hover .work-image img{transform:scale(1.05)}
.work-image-cta{
  position:absolute;
  bottom:18px; left:20px; right:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  color:var(--paper);
  font-size:10px;
  letter-spacing:0.25em;
  text-transform:uppercase;
  opacity:0;
  transform:translateY(8px);
  transition:opacity 0.35s ease, transform 0.35s ease;
  z-index:2;
}
.work:hover .work-image-cta{opacity:1; transform:translateY(0)}
.work-image-cta span:last-child{font-family:var(--serif); font-style:italic; letter-spacing:0.04em; text-transform:none; font-size:13px}

.work-info{flex:1; display:flex; flex-direction:column}
.work-info h3{
  font-family:var(--serif);
  font-size:22px;
  font-style:italic;
  font-weight:400;
  margin-bottom:10px;
  line-height:1.2;
  letter-spacing:-0.01em;
}
.work-meta{
  font-size:11px;
  letter-spacing:0.12em;
  text-transform:uppercase;
  color:var(--ink-faded);
  margin-bottom:10px;
  line-height:1.6;
}
.work-meta-sep{margin:0 6px; opacity:0.5}
.work-price{
  font-family:var(--serif);
  font-size:16px;
  font-weight:500;
  color:var(--clay);
  margin-top:auto;
  padding-top:8px;
}

.work--hidden{display:none}
.gallery-more{
  text-align:center;
  padding-top:72px;
  max-width:var(--max);
  margin:0 auto;
}
.gallery-more button{
  font-family:var(--serif);
  font-style:italic;
  font-size:19px;
  font-weight:300;
  color:var(--ink);
  background:none;
  border:none;
  cursor:pointer;
  letter-spacing:0.01em;
  position:relative;
  padding:6px 4px;
}
.gallery-more button::after{
  content:"";
  position:absolute;
  bottom:0;left:0;
  width:100%;height:1px;
  background:var(--clay);
  transform:scaleX(0.3);
  transform-origin:left;
  transition:transform 0.4s ease;
}
.gallery-more button:hover{color:var(--clay)}
.gallery-more button:hover::after{transform:scaleX(1)}

/* ============================================
   CURRÍCULUM
============================================ */
.cv{background:var(--paper-2)}
.cv-wrap{max-width:var(--max); margin:0 auto}
.cv-grid{
  display:grid;
  grid-template-columns:240px 1fr;
  gap:64px;
  margin-bottom:60px;
  padding-bottom:48px;
  border-bottom:1px solid var(--line-soft);
}
.cv-grid:last-of-type{border:none; margin-bottom:0; padding-bottom:0}
.cv-category{
  font-family:var(--serif);
  font-size:22px;
  font-style:italic;
  font-weight:400;
  position:sticky;
  top:120px;
  align-self:start;
  letter-spacing:-0.01em;
}
.cv-list{list-style:none}
.cv-item{
  display:grid;
  grid-template-columns:110px 1fr;
  gap:32px;
  padding:20px 0;
  border-bottom:1px dashed rgba(26,22,18,0.1);
  align-items:baseline;
}
.cv-item:first-child{padding-top:0}
.cv-item:last-child{border:none; padding-bottom:0}
.cv-year{
  font-family:var(--serif);
  font-size:17px;
  font-weight:500;
  color:var(--clay);
  font-feature-settings:"tnum" 1;
}
.cv-desc strong{
  font-weight:500;
  display:block;
  margin-bottom:4px;
  font-size:16px;
  letter-spacing:-0.005em;
}
.cv-desc span{
  color:var(--ink-soft);
  font-size:14px;
}

/* ============================================
   CONTACTO
============================================ */
.contact{
  padding:170px 48px;
  text-align:center;
  position:relative;
}
.contact-content{
  max-width:780px;
  margin:0 auto;
}
.contact-pretitle{
  font-size:10px;
  letter-spacing:0.4em;
  text-transform:uppercase;
  color:var(--clay);
  margin-bottom:28px;
  display:inline-flex;
  align-items:center;
  gap:14px;
}
.contact-pretitle::before, .contact-pretitle::after{
  content:"";
  width:24px;height:1px;background:var(--clay); opacity:0.5;
}
.contact h2{
  font-family:var(--serif);
  font-size:clamp(44px,6.8vw,88px);
  font-weight:300;
  line-height:1.05;
  letter-spacing:-0.025em;
  margin-bottom:56px;
}
.contact h2 em{font-style:italic; color:var(--clay)}
.contact-email{
  display:inline-block;
  font-family:var(--serif);
  font-size:clamp(24px,2.4vw,32px);
  font-style:italic;
  color:var(--ink);
  text-decoration:none;
  position:relative;
  margin-bottom:56px;
  padding:2px 0 6px;
  font-weight:400;
}
.contact-email::after{
  content:"";
  position:absolute;
  bottom:0;left:0;
  width:100%;height:1px;
  background:var(--clay);
  transform:scaleX(0.3);
  transform-origin:left;
  transition:transform 0.5s ease;
}
.contact-email:hover{color:var(--clay)}
.contact-email:hover::after{transform:scaleX(1)}
.contact-socials{
  display:flex;
  justify-content:center;
  gap:36px;
  list-style:none;
  flex-wrap:wrap;
}
.contact-socials a{
  color:var(--ink-soft);
  text-decoration:none;
  font-size:11px;
  letter-spacing:0.25em;
  text-transform:uppercase;
  transition:color 0.25s;
  position:relative;
  padding-bottom:2px;
}
.contact-socials a::after{
  content:"";
  position:absolute; bottom:-2px; left:0;
  width:100%; height:1px;
  background:var(--clay);
  transform:scaleX(0); transform-origin:right;
  transition:transform 0.3s;
}
.contact-socials a:hover{color:var(--ink)}
.contact-socials a:hover::after{transform:scaleX(1); transform-origin:left}

/* ============================================
   FOOTER
============================================ */
footer{
  padding:36px 48px;
  border-top:1px solid var(--line-soft);
  display:flex;
  justify-content:space-between;
  font-size:11px;
  color:var(--ink-faded);
  letter-spacing:0.12em;
  text-transform:uppercase;
}

/* ============================================
   MOBILE
============================================ */
@media (max-width: 760px){
  .hero{grid-template-columns:1fr; gap:48px; padding-top:140px}
  .hero-image{aspect-ratio:5/4; max-height:60vh}
  .about-grid{gap:56px}
  .gallery-grid{gap:40px 24px}
  :root{--gutter:24px}
  nav{padding:18px 24px}
  nav.scrolled{padding:12px 24px}
  .nav-links{display:none}
  section{padding:88px 24px}
  .hero{
    padding:130px 24px 70px;
    min-height:auto;
  }
  .hero h1{margin-bottom:32px}
  .hero-meta{display:none}
  .about{padding:88px 24px}
  .about-grid{grid-template-columns:1fr; gap:40px}
  .about-image{position:static; aspect-ratio:1/1}
  .gallery-grid{grid-template-columns:1fr; gap:56px}
  .work{grid-column:1/-1 !important; margin-top:0 !important}
  .cv-grid{grid-template-columns:1fr; gap:24px; margin-bottom:48px; padding-bottom:36px}
  .cv-category{position:static; font-size:20px}
  .cv-item{grid-template-columns:84px 1fr; gap:20px; padding:14px 0}
  .section-header{grid-template-columns:1fr; gap:16px; margin-bottom:56px}
  .section-num::after{display:none}
  .statement{padding:90px 24px}
  .statement-body blockquote{font-size:24px; padding-left:20px; margin-bottom:40px}
  .contact{padding:90px 24px}
  .contact-socials{gap:24px}
  footer{flex-direction:column; gap:10px; text-align:center; padding:32px 24px}
}

/* ============================================
   MODAL (lightbox de obra)
============================================ */
.modal-overlay{
  position:fixed;
  inset:0;
  z-index:200;
  background:rgba(26,22,18,0.92);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:40px;
  opacity:0;
  pointer-events:none;
  transition:opacity 0.35s ease;
}
.modal-overlay.active{
  opacity:1;
  pointer-events:all;
}
.modal{
  background:var(--paper);
  max-width:1100px;
  width:100%;
  display:grid;
  grid-template-columns:1.3fr 1fr;
  max-height:88vh;
  overflow:hidden;
  transform:translateY(16px) scale(0.99);
  transition:transform 0.4s ease;
  position:relative;
}
.modal-overlay.active .modal{transform:translateY(0) scale(1)}
.modal-image{
  display:flex;
  align-items:center;
  justify-content:center;
  background:var(--paper-2);
  overflow:hidden;
  position:relative;
  min-height:300px;
}
.modal-image img{
  max-width:100%;
  max-height:88vh;
  width:auto;
  height:auto;
  display:block;
  object-fit:contain;
}
.modal-body{
  padding:56px 48px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:20px;
  position:relative;
}
.modal-counter{
  font-family:var(--serif);
  font-style:italic;
  font-size:12px;
  letter-spacing:0.1em;
  color:var(--clay);
  margin-bottom:4px;
}
.modal-title{
  font-family:var(--serif);
  font-size:36px;
  font-style:italic;
  font-weight:400;
  line-height:1.15;
  letter-spacing:-0.015em;
}
.modal-meta{
  font-size:11px;
  letter-spacing:0.12em;
  text-transform:uppercase;
  color:var(--ink-faded);
  line-height:1.7;
}
.modal-desc{
  font-size:16px;
  line-height:1.78;
  color:var(--ink-soft);
  border-top:1px solid var(--line);
  padding-top:22px;
  text-wrap:pretty;
}
.modal-price{
  font-family:var(--serif);
  font-size:26px;
  font-weight:500;
  color:var(--clay);
  margin-top:auto;
  padding-top:8px;
}
.modal-price-label{
  display:block;
  font-family:var(--sans);
  font-size:10px;
  letter-spacing:0.3em;
  text-transform:uppercase;
  color:var(--ink-faded);
  font-weight:400;
  margin-bottom:4px;
}
.modal-close{
  position:fixed;
  top:24px;right:32px;
  background:none;
  border:none;
  color:var(--paper);
  font-size:22px;
  cursor:pointer;
  opacity:0.7;
  transition:opacity 0.2s, transform 0.2s;
  line-height:1;
  z-index:202;
  padding:8px;
}
.modal-close:hover{opacity:1; transform:rotate(90deg)}

// ============================================
// INTERACTIONS
// ============================================
function initNav() {
  var nav = document.getElementById('mainNav');
  if (!nav) return;
  var onScroll = function() {
    if (window.scrollY > 24) nav.classList.add('scrolled');
    else nav.classList.remove('scrolled');
  };
  window.addEventListener('scroll', onScroll, { passive: true });
  onScroll();
}

function initGallery() {
  var btn = document.getElementById('verMasBtn');
  if (!btn) return;
  btn.addEventListener('click', function() {
    document.querySelectorAll('.work--hidden').forEach(function(w) {
      w.classList.remove('work--hidden');
      requestAnimationFrame(function(){ w.classList.add('in'); });
    });
    btn.parentElement.remove();
  });
}

var currentObraIndex = -1;
function initModal() {
  var overlay = document.getElementById('modalOverlay');
  var modalImg = document.getElementById('modalImg');
  var modalTitle = document.getElementById('modalTitle');
  var modalMeta = document.getElementById('modalMeta');
  var modalDesc = document.getElementById('modalDesc');
  var modalPrice = document.getElementById('modalPrice');
  var modalCounter = document.getElementById('modalCounter');

  function openObra(index) {
    var works = document.querySelectorAll('#galleryGrid .work');
    if (index < 0) index = works.length - 1;
    if (index >= works.length) index = 0;
    var work = works[index];
    if (!work) return;
    currentObraIndex = index;
    var img = work.querySelector('.work-image img');
    modalImg.src = img.src;
    modalImg.alt = img.alt;
    modalTitle.textContent = work.querySelector('.work-info h3').textContent;
    modalMeta.textContent = work.querySelector('.work-meta').textContent.replace(/\s+/g,' ').trim();
    modalDesc.textContent = work.dataset.description || '';
    modalPrice.textContent = work.querySelector('.work-price').textContent;
    modalCounter.textContent = (index + 1) + ' / ' + works.length;
    overlay.classList.add('active');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    overlay.classList.remove('active');
    document.body.style.overflow = '';
    currentObraIndex = -1;
  }

  document.addEventListener('click', function(e) {
    var work = e.target.closest('.work');
    if (!work) return;
    var index = parseInt(work.dataset.index, 10);
    openObra(index);
  });

  document.getElementById('modalClose').addEventListener('click', closeModal);
  document.getElementById('modalPrev').addEventListener('click', function(){ openObra(currentObraIndex - 1); });
  document.getElementById('modalNext').addEventListener('click', function(){ openObra(currentObraIndex + 1); });
  overlay.addEventListener('click', function(e) { if (e.target === overlay) closeModal(); });
  document.addEventListener('keydown', function(e) {
    if (!overlay.classList.contains('active')) return;
    if (e.key === 'Escape') closeModal();
    else if (e.key === 'ArrowLeft') openObra(currentObraIndex - 1);
    else if (e.key === 'ArrowRight') openObra(currentObraIndex + 1);
  });
}

function initReveal() {
  var io = new IntersectionObserver(function(entries){
    entries.forEach(function(e){
      if (e.isIntersecting) {
        e.target.classList.add('in');
        io.unobserve(e.target);
      }
    });
  }, { rootMargin: '0px 0px -60px 0px', threshold: 0.1 });
  document.querySelectorAll('[data-reveal]').forEach(function(el){ io.observe(el); });
}

(async function() {
  var d = await getInfo();
  document.body.innerHTML = [
    renderNav(d),
    renderHero(d),
    renderAbout(d),
    renderStatement(d),
    renderGallery(d),
    renderCV(d),
    renderContact(d),
    renderFooter(d),
    renderModal()
  ].join('');
  initNav();
  initModal();
  initGallery();
  initReveal();
})();
</script>
